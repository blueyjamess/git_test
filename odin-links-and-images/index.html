<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Links and Images</title>
</head>
<body>
    <h1>Homepage</h1>
    <!--This is how to link another webpage from a different website to your webpage. It is called Absolute Link-->
    <a href="https://www.theodinproject.com/about" target="_blank" rel="noreferrer">About The Odin Project</a>
    <!--This is how to link another webpage from the same website to your webpage. It is called Relative Link-->
    <p><a href="pages/about.html" target="_blank" rel="noreferrer">About</a></p>
    <img src="./images/dog.jpg">
</body>
</html>
